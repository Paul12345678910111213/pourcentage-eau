<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Pourcentage d'eau 💧</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #eaf6ff;
}

.container {
  display: flex;
  justify-content: center;
  gap: 40px;
  margin-top: 30px;
}

.card {
  background: white;
  width: 220px;
  border-radius: 12px;
  padding: 10px;
  cursor: pointer;
  box-shadow: 0 0 10px rgba(0,0,0,0.2);
  transition: transform 0.2s;
}

.card:hover {
  transform: scale(1.05);
}

img {
  width: 100%;
  height: 160px;
  object-fit: cover;
  border-radius: 10px;
}

button {
  margin-top: 20px;
  padding: 10px 15px;
  cursor: pointer;
}
</style>
</head>

<body>

<h1>💧 Pourcentage d'eau</h1>
<h3 id="question"></h3>

<div class="container">
  <div class="card" onclick="choose('A')">
    <img id="imgA">
    <h3 id="nameA"></h3>
  </div>

  <div class="card" onclick="choose('B')">
    <img id="imgB">
    <h3 id="nameB"></h3>
  </div>
</div>

<p id="result"></p>
<h2>Score : <span id="score">0</span></h2>

<button onclick="startGame()">Rejouer</button>

<script>

// 🔹 DATA PROPRE ET COHÉRENT
const data = [
{ name:"Rafael Nadal", water:60, img:"https://upload.wikimedia.org/wikipedia/commons/5/5d/Rafael_Nadal_2011.jpg" },
{ name:"Quad Yamaha Kodiak 450 EPS Olive Green", water:0, img:"https://upload.wikimedia.org/wikipedia/commons/3/3f/ATV_Yamaha.jpg" },
{ name:"Bûche glacée", water:55, img:"https://upload.wikimedia.org/wikipedia/commons/5/5b/B%C3%BBche_de_No%C3%ABl_glac%C3%A9e.jpg" },
{ name:"Pizza", water:50, img:"https://upload.wikimedia.org/wikipedia/commons/3/3e/Rotary_phone.jpg" },
{ name:"Pépin le Bref", water:60, img:"https://upload.wikimedia.org/wikipedia/commons/6/6e/Charlemagne_and_Pippin.jpg" },
{ name:"Cerf-volant", water:0, img:"https://upload.wikimedia.org/wikipedia/commons/3/3a/Kite_flying.jpg" },
{ name:"Mousse à raser", water:90, img:"https://upload.wikimedia.org/wikipedia/commons/5/5f/Shaving_cream.jpg" },
{ name:"Cerveau humain", water:73, img:"https://upload.wikimedia.org/wikipedia/commons/3/3a/Chair.jpg" },
{ name:"Brique", water:0, img:"https://upload.wikimedia.org/wikipedia/commons/3/3e/Brick_wall.jpg" },
{ name:"Chaise", water:5, img:"https://upload.wikimedia.org/wikipedia/commons/1/1c/USB_flash_drive.jpg" },
{ name:"Cactus", water:85, img:"https://upload.wikimedia.org/wikipedia/commons/3/3f/Cactus.jpg" },
{ name:"Dentifrice", water:30, img:"https://upload.wikimedia.org/wikipedia/commons/3/3e/Lamp.jpg" },
{ name:"Chaussure", water:2, img:"https://upload.wikimedia.org/wikipedia/commons/3/3f/Shoe.jpg" },
{ name:"Os Humain", water:25, img:"https://upload.wikimedia.org/wikipedia/commons/6/6a/Laptop_illustration.jpg" },
{ name:"Lave volcanique", water:2.5, img:"https://upload.wikimedia.org/wikipedia/commons/2/2e/Computer_mouse.jpg" },
{ name:"Nuage", water:99, img:"https://upload.wikimedia.org/wikipedia/commons/3/3a/Clouds.jpg" },
{ name:"Bouteille vide", water:1, img:"https://upload.wikimedia.org/wikipedia/commons/3/3e/Plastic_bottle.jpg" },
{ name:"Parapluie", water:0, img:"https://upload.wikimedia.org/wikipedia/commons/3/3a/Umbrella.jpg" },
{ name:"Télévision", water:0, img:"https://upload.wikimedia.org/wikipedia/commons/3/3f/Old_television.jpg" },
{ name:"Horloge", water:0, img:"https://upload.wikimedia.org/wikipedia/commons/3/3a/Clock.jpg" }
];

// 🔹 DUELS PROPRES
const duels = [
[0,1],
[2,10],
[4,3],
[6,7],
[8,9],
[10,11],
[12,13],
[11,13],
[16,17],
[9,14]
];

let A, B;
let score = 0;
let q = 0;

// 🔹 START
function startGame(){
  score = 0;
  q = 0;
  document.getElementById("score").innerText = score;
  nextQuestion();
}

// 🔹 QUESTION
function nextQuestion(){

  if(q >= duels.length){
    document.getElementById("result").innerText =
      "🎉 Fin du jeu ! Score : " + score + " / " + duels.length;
    return;
  }

  let duel = duels[q];
  A = data[duel[0]];
  B = data[duel[1]];

  document.getElementById("imgA").src = A.img;
  document.getElementById("imgB").src = B.img;

  document.getElementById("nameA").innerText = A.name;
  document.getElementById("nameB").innerText = B.name;

  document.getElementById("question").innerText =
    "Question " + (q+1) + " / " + duels.length;

  document.getElementById("result").innerText = "";
}

// 🔹 CHOIX
function choose(choice){

  let correct =
    (A.water > B.water && choice === "A") ||
    (B.water > A.water && choice === "B");

  // 🔹 Toujours afficher les pourcentages
  let message = "";

  if(correct){
    score++;
    message = "✅ Correct ! A=" + A.water + "% | B=" + B.water + "%";
  } else {
    message = "❌ Faux ! A=" + A.water + "% | B=" + B.water + "%";
  }

  document.getElementById("result").innerText = message;
  document.getElementById("score").innerText = score;

  q++;
  setTimeout(nextQuestion, 900);
}

startGame();

</script>

</body>
</html>
